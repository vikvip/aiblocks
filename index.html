<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIBlock — AI Advisory, Implementation & Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08111f;
      --bg-soft: #0e1a2d;
      --bg-card: rgba(255,255,255,0.06);
      --bg-card-strong: rgba(255,255,255,0.09);
      --surface: #f6f8fc;
      --ink: #0e1728;
      --muted: #5f6b7e;
      --muted-soft: #93a0b3;
      --white: #ffffff;
      --line: rgba(255,255,255,0.12);
      --line-dark: rgba(12, 23, 40, 0.08);
      --brand: #76e4c3;
      --brand-strong: #29c59a;
      --brand-soft: rgba(118, 228, 195, 0.14);
      --accent: #8ca8ff;
      --shadow-xl: 0 30px 80px rgba(5, 12, 24, 0.35);
      --shadow-lg: 0 18px 50px rgba(9, 20, 35, 0.14);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --container: 1200px;
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Manrope', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(118, 228, 195, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(140, 168, 255, 0.12), transparent 26%),
        linear-gradient(180deg, #09111f 0%, #0d1728 100%);
      color: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.35), transparent 65%);
      z-index: -1;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(var(--container), calc(100% - 40px));
      margin: 0 auto;
    }

    .section-shell {
      background: var(--surface);
      color: var(--ink);
      border-radius: 36px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      margin: 20px auto;
      width: min(calc(var(--container) + 60px), calc(100% - 24px));
    }

    .section {
      padding: 96px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 0 6px rgba(118, 228, 195, 0.12);
    }

    h1, h2, h3, h4 {
      font-family: var(--font-heading);
      letter-spacing: -0.03em;
    }

    .section-title {
      font-size: clamp(2rem, 4.4vw, 3.75rem);
      line-height: 1.05;
      margin-bottom: 18px;
    }

    .section-title span,
    .hero-title span {
      color: var(--brand);
    }

    .section-copy,
    .hero-copy {
      font-size: 1.05rem;
      color: var(--muted-soft);
      max-width: 620px;
    }

    /* NAV */
    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(8, 17, 31, 0.68);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav {
      width: min(var(--container), calc(100% - 40px));
      margin: 0 auto;
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 800;
      font-size: 1.1rem;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(118,228,195,0.24), rgba(140,168,255,0.18));
      border: 1px solid rgba(255,255,255,0.12);
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .brand-mark svg { width: 22px; height: 22px; }
    .brand span { color: var(--brand); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
      color: rgba(255,255,255,0.82);
      font-size: 0.95rem;
    }

    .nav-links a
